services:
  postgres:
    image: postgres:16-alpine
    container_name: eva-board-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eva_board
    ports:
      # Host 5433 -> container 5432 (5433 chosen to avoid clashing with a
      # local Postgres install on 5432).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eva_board"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot migration runner. Runs `migrate up` against the postgres
  # service and exits; the api service waits on it via
  # `service_completed_successfully` so a fresh `make up` always migrates.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/bin/migrate", "up"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eva_board?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/bin/server"]
    env_file:
      - ./backend/.env
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eva_board?sslmode=disable
      APP_URL: http://localhost:8080
    ports:
      # Host 8080 -> container 8080 (Fiber HTTP server, /health endpoint).
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  pgdata:
