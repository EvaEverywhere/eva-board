name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -short
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files:"
            gofmt -l .
            exit 1
          fi
