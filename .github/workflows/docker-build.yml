name: docker-build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ghcr.io/evaeverywhere/eva-board

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tags=${IMAGE_NAME}:${GITHUB_REF_NAME},${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "tags=${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
